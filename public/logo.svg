<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="198" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="2"/>

  <!-- White horizontal band -->
  <rect x="2" y="218" width="396" height="62" fill="#F5F5F5"/>

  <!-- PMM letters -->
  <text x="200" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="148" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-4">PMM</text>

  <!-- "Perfect Model Management" on white band -->
  <text x="200" y="262" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="400" fill="#0A0A0A" text-anchor="middle" letter-spacing="0.5">Perfect Model Management</text>

  <!-- Bottom arc clip for "Agence de mannequins" -->
  <clipPath id="bottomCircle">
    <circle cx="200" cy="200" r="198"/>
  </clipPath>
  <rect x="2" y="280" width="396" height="120" fill="#0A0A0A" clip-path="url(#bottomCircle)"/>
  <text x="200" y="322" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" font-style="italic" fill="white" text-anchor="middle" letter-spacing="1" clip-path="url(#bottomCircle)">Agence de mannequins</text>
</svg>
