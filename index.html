<body>
    <!-- Loading Screen -->
    <div id="loader" style="
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
        overflow: hidden;
    ">
        <!-- Walking Model Silhouette -->
        <div class="model-container">
            <div class="model-head"></div>
            <div class="model-torso"></div>
            <div class="model-arm-left"></div>
            <div class="model-arm-right"></div>
            <div class="model-leg-left"></div>
            <div class="model-leg-right"></div>
        </div>
        
        <!-- Logo Container -->
        <div style="
            position: relative;
            z-index: 10;
            text-align: center;
            animation: logoFloat 3s ease-in-out infinite;
        ">
            <!-- Logo Image -->
            <img src="/logopmm.jpg" alt="PMM" style="
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 3px solid #D4AF37;
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 0 80px rgba(212, 175, 55, 0.2);
                object-fit: cover;
                animation: logoGlow 2s ease-in-out infinite alternate;
            ">
            
            <!-- Brand Name -->
            <div style="
                margin-top: 24px;
                font-family: 'Playfair Display', serif;
                font-size: 28px;
                font-weight: 900;
                font-style: italic;
                color: #D4AF37;
                letter-spacing: 4px;
                text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            ">PERFECT MODELS</div>
            
            <!-- Tagline -->
            <div style="
                margin-top: 8px;
                font-family: 'Montserrat', sans-serif;
                font-size: 11px;
                font-weight: 300;
                letter-spacing: 6px;
                color: rgba(255, 255, 255, 0.6);
                text-transform: uppercase;
            ">Management</div>
        </div>
        
        <!-- Loading Bar -->
        <div style="
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 2px;
            overflow: hidden;
        ">
            <div style="
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, #D4AF37, transparent);
                animation: loadingBar 1.5s ease-in-out infinite;
            "></div>
        </div>
        
        <!-- Loading Text -->
        <div style="
            position: absolute;
            bottom: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(212, 175, 55, 0.6);
            text-transform: uppercase;
            animation: loadingText 1.5s ease-in-out infinite;
        ">Chargement</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    
    <style>
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes logoGlow {
            from { box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 0 80px rgba(212, 175, 55, 0.2); }
            to { box-shadow: 0 0 60px rgba(212, 175, 55, 0.6), 0 0 100px rgba(212, 175, 55, 0.4); }
        }
        
        @keyframes loadingBar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        @keyframes loadingText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        /* Walking Model Animations */
        .model-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 200px;
            height: 400px;
            transform: translateX(-50%);
            z-index: 0;
            animation: walkBody 1.5s ease-in-out infinite;
        }
        
        @keyframes walkBody {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            25% { transform: translateX(-50%) translateY(-8px); }
            50% { transform: translateX(-50%) translateY(0); }
            75% { transform: translateX(-50%) translateY(-8px); }
        }
        
        .model-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 60px;
            background: linear-gradient(180deg, #D4AF37 0%, rgba(212, 175, 55, 0.3) 100%);
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        
        .model-torso {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 140px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.6) 0%, rgba(212, 175, 55, 0.2) 100%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        
        .model-arm-left, .model-arm-right {
            position: absolute;
            top: 65px;
            width: 20px;
            height: 120px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.7) 0%, rgba(212, 175, 55, 0.2) 100%);
            border-radius: 10px;
            transform-origin: top center;
        }
        
        .model-arm-left { left: 25px; animation: armLeft 1.5s ease-in-out infinite; }
        .model-arm-right { right: 25px; animation: armRight 1.5s ease-in-out infinite; }
        
        @keyframes armLeft {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(20deg); }
        }
        
        @keyframes armRight {
            0%, 100% { transform: rotate(15deg); }
            50% { transform: rotate(-20deg); }
        }
        
        .model-leg-left, .model-leg-right {
            position: absolute;
            top: 185px;
            width: 25px;
            height: 180px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.5) 0%, rgba(212, 175, 55, 0.1) 100%);
            border-radius: 12px;
            transform-origin: top center;
        }
        
        .model-leg-left { left: 50px; animation: legLeft 1.5s ease-in-out infinite; }
        .model-leg-right { right: 50px; animation: legRight 1.5s ease-in-out infinite; }
        
        @keyframes legLeft {
            0%, 100% { transform: rotate(-10deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
        }
        
        @keyframes legRight {
            0%, 100% { transform: rotate(10deg); }
            25% { transform: rotate(-15deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(5deg); }
        }
        
        /* Hide loader when app is ready */
        .loader-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
        }
    </style>
</body>
